site_name: Complexity Gap
site_description: Empirical research on the gap between theoretical complexity and real performance of graph search algorithms
site_author: Gabriel
site_url: https://gabrxgomes.github.io/complexity-gap

repo_name: complexity-gap
repo_url: https://github.com/gabrxgomes/complexity-gap

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark mode
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Research:
    - Introduction: research/introduction.md
    - Theoretical Background: research/theory.md
    - Methodology: research/methodology.md
    - Experiments: research/experiments.md
    - Gap Analysis: research/gap-analysis.md
    - Conclusion: research/conclusion.md
  - Code:
    - Overview: code/overview.md
    - Graph Generators: code/graph-generators.md
    - Algorithms: code/algorithms.md
    - Experiment Pipeline: code/pipeline.md
  - Results:
    - Tables: results/tables.md
    - Charts: results/charts.md
  - About: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gabrxgomes
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/RetroDevdotcom
